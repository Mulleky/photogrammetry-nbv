# Gazebo -> ROS 2 camera topics
- ros_topic_name: /rgbd/image
  gz_topic_name: /rgbd/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /rgbd/camera_info
  gz_topic_name: /rgbd/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS

# Optional gimbal commands (ROS 2 -> Gazebo)
# These names match the model used in the guidance repository.
- ros_topic_name: /gimbal/pitch
  gz_topic_name: /model/px4_gsplat_0/command/manual_gimbal_pitch
  ros_type_name: std_msgs/msg/Float64
  gz_type_name: gz.msgs.Double
  direction: ROS_TO_GZ

- ros_topic_name: /gimbal/yaw
  gz_topic_name: /model/px4_gsplat_0/command/manual_gimbal_yaw
  ros_type_name: std_msgs/msg/Float64
  gz_type_name: gz.msgs.Double
  direction: ROS_TO_GZ
