scorer:
  name: gt_phase_adaptive_hybrid             # covisibility | repair_weighted_covisibility | baseline_aware_repair_covisibility
  weights:
    covisibility: 1.0
    novelty: 1.2
    movement_cost: 0.1
    angular_separation_penalty: 0.4
  min_track_length: 2
  min_angular_separation_deg: 20.0
  gimbal_pitch_rad: -0.54
  travel_distance_scale_m: 10.0
  yaw_change_scale_rad: 3.141592653589793
  novelty_distance_scale_m: 2.0
  scoring_bbox_half_extent: 2.0

  # --- Repair-weighted co-visibility scorer parameters ---
  # Active when scorer.name = repair_weighted_covisibility
  # Also used as weakness base by baseline_aware_repair_weighted_covisibility
  repair_weighted_covisibility:
    target_track_length: 6
    density_k: 5
    max_scored_points: 0            # 0 = no cap
    weakness_weights:
      track_support: 0.5
      local_density: 0.3
      reprojection: 0.2             # disabled until validated

  # --- Baseline-aware repair-weighted co-visibility scorer parameters ---
  # Active when scorer.name = baseline_aware_repair_weighted_covisibility
  baseline_aware_repair_weighted_covisibility:
    target_track_length: 6
    density_k: 5
    max_scored_points: 0
    weakness_weights:
      track_support: 0.6
      local_density: 0.4
      reprojection: 0.0
    theta_low_deg: 5.0              # angles below this get zero gain
    theta_target_deg: 25.0          # full gain reached at this angle
    theta_high_deg: 45.0            # gain saturates at 1.0 above this

  # --- GT Phase-Adaptive Hybrid scorer parameters ---
  # Active when scorer.name = gt_phase_adaptive_hybrid
  # Wraps covisibility + baseline_aware_repair_weighted_covisibility
  # and switches between them per iteration using a gate.
  hybrid:
    gate_mode: oracle               # shadow | heuristic | oracle | learned_switch

    heuristic:
      budget_fraction_threshold: 0.4  # below this -> geometry scorer
      knn_p95_threshold: 0.14         # above this -> geometry scorer

    oracle:
      gt_mesh_path: "/home/dreamslab/PX4-Autopilot/Tools/simulation/gz/models/lunar_sample_15016/meshes/15016-0_SFM_Web-Resolution-Model_Coordinate-Registered.obj"              # path to GT .obj mesh (required for oracle mode)
      n_gt_samples: 30000           # surface samples for coverage evaluation
      coverage_threshold_m: 0.02    # distance threshold to mark a sample as covered

    learned_switch:
      policy_json_path: ""          # path to exported decision-tree JSON

    shadow:
      enabled: true                 # write shadow logs regardless of gate_mode
      log_top_k: 5                  # top-k candidates logged per scorer
