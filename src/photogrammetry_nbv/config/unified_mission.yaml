/**:
  ros__parameters:
    # === Output ===
    output_root: ~/photogrammetry_NBV/data/photogrammetry

    # === Phase 1 — Seed hemisphere ===
    seed_radius_m: 4.0
    ring_image_count: 24
    seed_min_elevation_deg: 5.0
    seed_max_elevation_deg: 30.0

    # === Phase 2 — Co-visibility NBV ===
    rock_center_x: 0.0
    rock_center_y: 8.0
    rock_center_z: -0.8
    image_budget: 40
    max_image_budget: 55
    stopping_criterion: image_budget   # 'image_budget' | 'knn_distance' | 'both'
    knn_distance_threshold: 0.003

    raw_candidate_count: 800
    target_candidate_count: 200
    candidate_radius_m: 3.5
    candidate_min_spacing_m: 0.3
    min_elevation_deg: 5.0
    max_elevation_deg: 55.0

    min_altitude_ned: -20.0
    max_altitude_ned: -1.5
    max_candidate_travel_m: 40.0
    land_after_budget: true
    eval_bbox_half_extent: 6.0

    # === Planner mode ===
    seed_planner_mode: stratified         # 'fibonacci' | 'stratified'
    seed_elevation_rings_deg: [15.0, 22.0, 29.0, 36.0]
    seed_azimuth_counts: [8, 6, 6, 4]

    phase2_planner_mode: hybrid           # 'fibonacci' | 'stratified' | 'hybrid'
    phase2_lateral_elevations_deg: [10.0, 15.0, 25.0, 35.0]
    phase2_upper_elevations_deg: [35.0, 45.0, 55.0]
    phase2_lateral_candidate_count: 120
    phase2_upper_candidate_count: 50

    azimuth_sector_count: 8
    adaptive_revisit_exclusion_m: 0.6

    # === Shared flight parameters ===
    takeoff_altitude: 3.0
    offboard_rate_hz: 10.0
    setpoint_warmup_cycles: 20
    position_tolerance_xy: 0.35
    position_tolerance_z: 0.35
    settle_time_sec: 2.0
    gimbal_pitch_rad: -0.54
    gimbal_yaw_rad: 0.0
    image_format: jpg

    # === Paths ===
    colmap_bin: colmap
    colmap_script_dir: ~/photogrammetry-covisibility/src/photogrammetry_nbv/colmap_scripts
    colmap_config_path: ~/photogrammetry-covisibility/src/photogrammetry_nbv/config/colmap.yaml
    scoring_config_path: ~/photogrammetry-covisibility/src/photogrammetry_nbv/config/scoring.yaml

    # === Topics ===
    offboard_control_mode_topic: /fmu/in/offboard_control_mode
    trajectory_setpoint_topic: /fmu/in/trajectory_setpoint
    vehicle_command_topic: /fmu/in/vehicle_command
    local_position_topic: /fmu/out/vehicle_local_position_v1
    vehicle_status_topic: /fmu/out/vehicle_status_v3
    image_topic: /rgbd/image
    camera_info_topic: /rgbd/camera_info
    gimbal_pitch_topic: /gimbal/pitch
    gimbal_yaw_topic: /gimbal/yaw
