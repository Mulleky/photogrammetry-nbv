colmap:
  # --- Feature extraction (SIFT) ---
  feature_extraction:
    camera_model: PINHOLE
    max_num_features: 16384

  # --- Feature matching ---
  matching:
    type: exhaustive

  # --- Sparse reconstruction (mapper) ---
  mapper:
    ba_global_max_num_iterations: 50
    filter_max_reproj_error: 4.0

  # --- Dense reconstruction ---
  dense:
    max_image_size: 2000
    geom_consistency: true

  # --- Weak-region extraction (for legacy weighted_sum scorer) ---
  weak_region_extraction:
    enabled: true
    max_regions: 12
    top_fraction: 0.15
    min_points_per_region: 10
    severity_weights:
      reconstruction_uncertainty: 0.40
      reprojection_error: 0.30
      track_length: 0.20
      projection_accuracy: 0.10

  # --- K-nearest-neighbor density metrics (for co-visibility stopping criterion) ---
  knn_distance:
    k: 5
    percentile: 95.0

  # --- Incremental update strategy ---
  incremental:
    enabled: true                    # false = full rebuild each iteration (previous behavior)
    global_ba_interval: 2            # run explicit global BA every N adaptive images
    final_global_ba: true            # global BA before dense reconstruction
    ba_max_num_iterations: 100       # iterations for periodic/final global BA
